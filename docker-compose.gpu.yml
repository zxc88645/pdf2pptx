version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - OCR_SERVICE_URL=http://ocr-service:8001
      - INPAINT_SERVICE_URL=http://inpaint-service:8002
      - MAX_PDF_PAGES=100
    depends_on:
      - ocr-service
      - inpaint-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - API_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile.gpu
    expose:
      - "8001"
    environment:
      - USE_GPU=true
      - HOME=/data/ocr-cache
    volumes:
      - ocr-models:/data/ocr-cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  inpaint-service:
    build:
      context: ./inpaint-service
      dockerfile: Dockerfile.gpu
    expose:
      - "8002"
    environment:
      - INPAINT_BACKEND=lama
      - INPAINT_CANVAS_SIZE=1024
      - LAMA_CANVAS_SIZE=1536
      - LAMA_MASK_DILATE=2
      - INPAINT_SIZE=1024
      - INPAINT_STEPS=50
      - INPAINT_STRENGTH=1
      - INPAINT_PADDING=96
      - INPAINT_MAX_REGIONS=32
      - HF_HOME=/data/hf-cache
    volumes:
      - hf-cache:/data/hf-cache
    restart: on-failure
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  ocr-models:
  hf-cache:
