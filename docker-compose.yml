services:
  frontend:
    build: ./frontend
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build: ./backend
    image: pdf2pptx-backend
    security_opt:
      - no-new-privileges:true
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_DIR=/data
      - MAX_UPLOAD_BYTES=52428800
    volumes:
      - app_data:/data
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  worker:
    image: pdf2pptx-backend
    security_opt:
      - no-new-privileges:true
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_DIR=/data
      - HF_HOME=/data/.hf
    volumes:
      - app_data:/data
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker -l info
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          cpus: "2"

  redis:
    image: redis:7-alpine
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  app_data:
  redis_data:
